<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>猜颜色 — Mastermind</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --panel: #0f3460;
  --accent: #e94560;
  --text: #eee;
  --text-dim: #8899aa;
  --gold: #f0c040;
  --slot-empty: rgba(255,255,255,.08);
  --slot-border: rgba(255,255,255,.15);
  --c0:#e74c3c; --c1:#3498db; --c2:#2ecc71; --c3:#f1c40f; --c4:#9b59b6;
  --c5:#e67e22; --c6:#1abc9c; --c7:#fd79a8;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,'Segoe UI','Noto Sans SC',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  height:100%;height:100dvh;
}

/* ===== 顶栏 ===== */
.header{
  width:100%;padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;
}
.header h1{
  font-size:18px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-info{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text-dim)}
.turn-num{color:var(--gold);font-weight:700;font-size:16px}
.btn-icon{
  background:none;border:1px solid rgba(255,255,255,.15);color:var(--text-dim);
  width:34px;height:34px;border-radius:8px;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.btn-icon:hover{background:rgba(255,255,255,.08);color:var(--text)}

/* ===== 游戏主区域 ===== */
.game-wrap{flex:1;display:flex;flex-direction:column;width:100%;max-width:480px;overflow:hidden;padding:0 8px}

/* 答案行 */
.answer-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 0 8px;flex-shrink:0}
.answer-slot{
  width:40px;height:40px;border-radius:50%;
  background:var(--panel);border:2px solid var(--slot-border);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:var(--text-dim);transition:all .4s;
}
.answer-slot.revealed{border-color:var(--gold);box-shadow:0 0 12px rgba(240,192,64,.3)}
.answer-slot .dot{width:26px;height:26px;border-radius:50%}

/* 猜测列表 */
.guess-list{
  flex:1;overflow-y:auto;padding:8px 4px;
  display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth;
}
.guess-list::-webkit-scrollbar{width:3px}
.guess-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

.guess-row{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:rgba(255,255,255,.03);border-radius:12px;transition:all .3s;flex-shrink:0;
  border:1px solid transparent;
}
.guess-row.active{background:rgba(233,69,96,.08);border-color:rgba(233,69,96,.2)}
.guess-row .row-num{width:20px;font-size:11px;color:var(--text-dim);text-align:center;flex-shrink:0}
.guess-dots{display:flex;gap:6px;flex:1;justify-content:center}
.guess-dot{
  width:36px;height:36px;border-radius:50%;
  background:var(--slot-empty);border:2px solid var(--slot-border);transition:all .2s;flex-shrink:0;
}

/* 反馈 pins */
.feedback{display:flex;flex-wrap:wrap;gap:3px;width:30px;flex-shrink:0;justify-content:center}
.fb-pin{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
}
.fb-pin.hit{background:var(--accent);border-color:var(--accent);box-shadow:0 0 4px rgba(233,69,96,.4)}
.fb-pin.bull{background:#fff;border-color:#fff;box-shadow:0 0 4px rgba(255,255,255,.3)}

/* 底部调色盘 */
.palette{flex-shrink:0;padding:10px 8px 8px;background:var(--bg2);border-top:1px solid rgba(255,255,255,.06)}
.palette-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.color-btn{
  width:44px;height:44px;border-radius:50%;border:3px solid transparent;
  cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.color-btn:active{transform:scale(.9)}
.color-btn.selected{
  border-color:#fff;
  box-shadow:0 0 0 2px var(--bg),0 0 0 4px #fff,0 2px 12px rgba(0,0,0,.4);
  transform:scale(1.1);
}
.color-btn[data-c="0"]{background:var(--c0)}
.color-btn[data-c="1"]{background:var(--c1)}
.color-btn[data-c="2"]{background:var(--c2)}
.color-btn[data-c="3"]{background:var(--c3)}
.color-btn[data-c="4"]{background:var(--c4)}
.color-btn[data-c="5"]{background:var(--c5)}
.color-btn[data-c="6"]{background:var(--c6)}
.color-btn[data-c="7"]{background:var(--c7)}

.action-btns{display:flex;gap:10px;justify-content:center;margin-top:10px;padding-bottom:env(safe-area-inset-bottom,4px)}
.btn{
  padding:10px 28px;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:1px;
}
.btn:active{transform:scale(.95)}
.btn-delete{background:rgba(255,255,255,.08);color:var(--text-dim);border:1px solid rgba(255,255,255,.1)}
.btn-delete:hover{background:rgba(255,255,255,.12)}
.btn-submit{background:linear-gradient(135deg,var(--accent),#c0392b);color:#fff;box-shadow:0 4px 16px rgba(233,69,96,.3)}
.btn-submit:hover{box-shadow:0 4px 20px rgba(233,69,96,.5)}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.12)}

/* ===== 弹窗通用 ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;z-index:100;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{
  background:var(--bg2);border:1px solid rgba(255,255,255,.1);border-radius:20px;
  padding:32px 28px;text-align:center;max-width:380px;width:90%;
  transform:scale(.9);transition:transform .3s;
}
.modal-overlay.show .modal{transform:scale(1)}
.modal .emoji{font-size:48px;margin-bottom:10px}
.modal h2{font-size:20px;margin-bottom:8px}
.modal p{font-size:14px;color:var(--text-dim);margin-bottom:18px;line-height:1.6}
.modal .btn{min-width:130px}

/* ===== 设置弹窗 ===== */
.settings-modal{max-width:400px;text-align:left}
.settings-modal h2{text-align:center;margin-bottom:20px;font-size:20px}
.setting-group{margin-bottom:20px}
.setting-label{
  font-size:13px;font-weight:600;color:var(--text-dim);
  margin-bottom:10px;letter-spacing:1px;display:flex;align-items:center;gap:6px;
}
.setting-label .icon{font-size:16px}

/* 滑块 */
.slider-wrap{display:flex;align-items:center;gap:12px}
.slider-wrap input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;
  height:6px;border-radius:3px;background:rgba(255,255,255,.1);outline:none;
}
.slider-wrap input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(233,69,96,.4);
}
.slider-val{
  min-width:36px;text-align:center;font-size:18px;font-weight:700;color:var(--gold);
}

/* 开关 */
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle-desc{font-size:13px;color:var(--text-dim);line-height:1.5;max-width:200px}
.toggle{
  width:48px;height:26px;border-radius:13px;
  background:rgba(255,255,255,.12);cursor:pointer;position:relative;transition:all .3s;flex-shrink:0;
}
.toggle.on{background:var(--accent)}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;
  background:#fff;transition:all .3s;box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.toggle.on::after{left:25px}

/* 难度预设 */
.preset-row{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.preset-btn{
  padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);color:var(--text-dim);font-size:12px;
  cursor:pointer;transition:all .2s;letter-spacing:1px;display:flex;align-items:center;gap:4px;
}
.preset-btn:hover,.preset-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.preset-btn .star{font-size:10px;opacity:.7}

/* 设置校验提示 */
.setting-warn{
  margin-top:12px;padding:10px 14px;border-radius:10px;
  background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.25);
  color:#ff6b6b;font-size:13px;text-align:left;line-height:1.6;
  display:none;
}
.setting-warn.show{display:block}
.setting-warn .warn-icon{margin-right:4px}

/* 难度指示器 */
.difficulty-bar{
  margin-top:16px;padding:0 4px;
}
.diff-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;
}
.diff-label{font-size:12px;color:var(--text-dim);letter-spacing:1px}
.diff-name{font-size:13px;font-weight:700;letter-spacing:1px}
.diff-track{
  width:100%;height:8px;border-radius:4px;
  background:rgba(255,255,255,.08);overflow:hidden;position:relative;
}
.diff-fill{
  height:100%;border-radius:4px;transition:all .4s;
  background:linear-gradient(90deg,#2ecc71,#f1c40f,#e67e22,#e74c3c,#9b59b6);
}
.diff-stats{
  display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--text-dim);
}

.settings-actions{display:flex;gap:10px;justify-content:center;margin-top:24px}

/* 颜色圆通用 */
.dot-0{background:var(--c0)!important;border-color:var(--c0)!important}
.dot-1{background:var(--c1)!important;border-color:var(--c1)!important}
.dot-2{background:var(--c2)!important;border-color:var(--c2)!important}
.dot-3{background:var(--c3)!important;border-color:var(--c3)!important}
.dot-4{background:var(--c4)!important;border-color:var(--c4)!important}
.dot-5{background:var(--c5)!important;border-color:var(--c5)!important}
.dot-6{background:var(--c6)!important;border-color:var(--c6)!important}
.dot-7{background:var(--c7)!important;border-color:var(--c7)!important}

/* 动画 */
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.pop{animation:pop .3s ease-out}
.shake{animation:shake .4s ease-out}
@keyframes reveal-bounce{0%{transform:scale(0) rotate(-180deg)}60%{transform:scale(1.2) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.reveal-anim{animation:reveal-bounce .5s ease-out forwards}

/* PC 响应式 */
@media(min-width:600px){
  body{justify-content:center;padding:20px}
  .game-wrap{max-width:420px;border:1px solid rgba(255,255,255,.06);border-radius:20px;overflow:hidden;background:var(--bg)}
  .guess-dot{width:40px;height:40px}
  .color-btn{width:50px;height:50px}
}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="header">
  <h1>🎯 猜颜色</h1>
  <div class="header-info">
    <span>第 <span class="turn-num" id="turnNum">1</span> / <span id="maxTurnDisp">12</span> 轮</span>
    <button class="btn-icon" onclick="openSettings()" title="设置">⚙️</button>
    <button class="btn-icon" onclick="newGame()" title="新游戏">🔄</button>
    <button class="btn-icon" onclick="toggleHelp()" title="规则">❓</button>
  </div>
</div>

<!-- 游戏区 -->
<div class="game-wrap">
  <div class="answer-row" id="answerRow"></div>
  <div class="guess-list" id="guessList"></div>
  <div class="palette">
    <div class="palette-row" id="paletteRow"></div>
    <div class="action-btns">
      <button class="btn btn-delete" onclick="deleteLast()">⌫ 撤回</button>
      <button class="btn btn-submit" id="submitBtn" onclick="submitGuess()" disabled>确认提交</button>
    </div>
  </div>
</div>

<!-- 规则弹窗 -->
<div class="modal-overlay" id="helpModal">
  <div class="modal">
    <div class="emoji">🎯</div>
    <h2>游戏规则</h2>
    <p id="helpText"></p>
    <button class="btn btn-submit" onclick="toggleHelp()">明白了！</button>
  </div>
</div>

<!-- 结果弹窗 -->
<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <div class="emoji" id="resultEmoji"></div>
    <h2 id="resultTitle"></h2>
    <p id="resultText"></p>
    <button class="btn btn-submit" onclick="newGame();closeModal('resultModal')">再来一局</button>
  </div>
</div>

<!-- 设置弹窗 -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal settings-modal">
    <h2>⚙️ 游戏设置</h2>

    <div class="setting-group">
      <div class="setting-label"><span class="icon">🎨</span> 颜色数量</div>
      <div class="slider-wrap">
        <input type="range" id="setColors" min="3" max="8" value="6" oninput="updateSlider(this,'colorVal')">
        <div class="slider-val" id="colorVal">6</div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label"><span class="icon">📏</span> 答案长度</div>
      <div class="slider-wrap">
        <input type="range" id="setLen" min="3" max="6" value="4" oninput="updateSlider(this,'lenVal')">
        <div class="slider-val" id="lenVal">4</div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label"><span class="icon">🔁</span> 允许重复颜色</div>
      <div class="toggle-row">
        <div class="toggle-desc">答案中可以出现相同颜色</div>
        <div class="toggle on" id="dupToggle" onclick="toggleDup()"></div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label"><span class="icon">🎯</span> 最大尝试次数</div>
      <div class="slider-wrap">
        <input type="range" id="setTurns" min="6" max="20" value="12" oninput="updateSlider(this,'turnVal')">
        <div class="slider-val" id="turnVal">12</div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label"><span class="icon">⚡</span> 快捷预设</div>
      <div class="preset-row">
        <div class="preset-btn" onclick="applyPreset('easy')">🌱 入门</div>
        <div class="preset-btn active" onclick="applyPreset('normal')">🎯 经典</div>
        <div class="preset-btn" onclick="applyPreset('hard')">🔥 进阶</div>
        <div class="preset-btn" onclick="applyPreset('expert')">💀 地狱</div>
      </div>
    </div>

    <!-- 难度指示器 -->
    <div class="difficulty-bar">
      <div class="diff-header">
        <span class="diff-label">当前难度</span>
        <span class="diff-name" id="diffName">经典</span>
      </div>
      <div class="diff-track">
        <div class="diff-fill" id="diffFill" style="width:50%"></div>
      </div>
      <div class="diff-stats">
        <span>组合数: <b id="comboCount">1296</b></span>
        <span>理论最少: <b id="minGuess">5</b> 步</span>
      </div>
    </div>

    <!-- 校验警告 -->
    <div class="setting-warn" id="settingWarn">
      <span class="warn-icon">⚠️</span>
      <span id="warnText"></span>
    </div>

    <div class="settings-actions">
      <button class="btn btn-secondary" onclick="closeModal('settingsModal')">取消</button>
      <button class="btn btn-submit" id="applyBtn" onclick="applySettings()">应用并重新开始</button>
    </div>
  </div>
</div>

<script>
// ===== 全局配置 =====
const COLOR_CSS = ['dot-0','dot-1','dot-2','dot-3','dot-4','dot-5','dot-6','dot-7'];

// 当前设置
let cfg = { numColors:6, codeLen:4, allowDup:true, maxTurns:12 };

let answer = [];
let currentGuess = [];
let gameOver = false;

// ===== 预设 =====
// 入门：3色3位重复12轮 → 组合少，容易推理
// 经典：5色4位重复10轮 → 标准入门
// 进阶：6色4位无重复9轮 → 需要逻辑推理
// 地狱：8色5位重复8轮 → 极限挑战
function applyPreset(name) {
  const presets = {
    easy:   { numColors:3, codeLen:3, allowDup:true,  maxTurns:12 },
    normal: { numColors:5, codeLen:4, allowDup:true,  maxTurns:10 },
    hard:   { numColors:6, codeLen:4, allowDup:false, maxTurns:9  },
    expert: { numColors:8, codeLen:5, allowDup:true,  maxTurns:8  },
  };
  const p = presets[name];
  if (!p) return;
  cfg = {...p};
  syncSettingsUI();
  // 高亮预设按钮
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.preset-btn').classList.add('active');
  validateSettings();
}

function syncSettingsUI() {
  document.getElementById('setColors').value = cfg.numColors;
  document.getElementById('colorVal').textContent = cfg.numColors;
  document.getElementById('setLen').value = cfg.codeLen;
  document.getElementById('lenVal').textContent = cfg.codeLen;
  document.getElementById('setTurns').value = cfg.maxTurns;
  document.getElementById('turnVal').textContent = cfg.maxTurns;
  document.getElementById('dupToggle').classList.toggle('on', cfg.allowDup);
}

function updateSlider(el, valId) {
  document.getElementById(valId).textContent = el.value;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  validateSettings();
}

function toggleDup() {
  const t = document.getElementById('dupToggle');
  t.classList.toggle('on');
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  validateSettings();
}

// ===== 设置校验 =====
function readSettingsFromUI() {
  return {
    numColors: parseInt(document.getElementById('setColors').value),
    codeLen:   parseInt(document.getElementById('setLen').value),
    maxTurns:  parseInt(document.getElementById('setTurns').value),
    allowDup:  document.getElementById('dupToggle').classList.contains('on'),
  };
}

function validateSettings() {
  const s = readSettingsFromUI();
  const warnEl = document.getElementById('settingWarn');
  const warnText = document.getElementById('warnText');
  const applyBtn = document.getElementById('applyBtn');
  const errors = [];

  // 核心校验：不允许重复时，颜色数必须 >= 答案长度
  if (!s.allowDup && s.numColors < s.codeLen) {
    errors.push(
      `关闭重复时，颜色数量（${s.numColors}种）必须 ≥ 答案长度（${s.codeLen}位），` +
      `否则无法生成有效答案。请增加颜色数量、缩短答案长度，或开启重复。`
    );
  }

  // 边界校验
  if (s.numColors < 3) errors.push('颜色数量至少 3 种。');
  if (s.codeLen < 3)   errors.push('答案长度至少 3 位。');
  if (s.maxTurns < 3)  errors.push('尝试次数至少 3 轮。');

  if (errors.length > 0) {
    warnText.innerHTML = errors.join('<br>');
    warnEl.classList.add('show');
    applyBtn.disabled = true;
    applyBtn.style.opacity = '.35';
    applyBtn.style.cursor = 'not-allowed';
  } else {
    warnEl.classList.remove('show');
    applyBtn.disabled = false;
    applyBtn.style.opacity = '1';
    applyBtn.style.cursor = 'pointer';
  }

  updateDifficultyBar(s);
}

// ===== 难度指示器 =====
function calcCombinations(s) {
  // 组合总数（允许重复 = n^k，不允许 = C(n,k)×k! = n!/(n-k)!）
  if (s.allowDup) {
    return Math.pow(s.numColors, s.codeLen);
  } else {
    let result = 1;
    for (let i = 0; i < s.codeLen; i++) result *= (s.numColors - i);
    return result;
  }
}

function updateDifficultyBar(s) {
  const combos = calcCombinations(s);
  document.getElementById('comboCount').textContent = combos.toLocaleString();

  // 理论最少猜测步数（信息论下界，ceil(log2(combos)) 近似）
  const minGuess = combos <= 1 ? 1 : Math.max(2, Math.ceil(Math.log(combos) / Math.log(2.5)));
  document.getElementById('minGuess').textContent = minGuess;

  // 难度评分 (0-100)：综合组合数、轮数余量、答案长度
  // 组合多 = 难，轮数少 = 难，答案长 = 难，无重复 = 略易
  const ratio = combos / Math.max(1, s.maxTurns); // 每轮需要排除的组合数
  let score = Math.min(100, Math.round(
    (Math.log(combos) / Math.log(100000)) * 50 +  // 组合数贡献
    ((20 - s.maxTurns) / 14) * 25 +               // 轮数贡献
    ((s.codeLen - 2) / 4) * 15 +                   // 长度贡献
    (s.allowDup ? 0 : 10)                          // 无重复加10
  ));
  score = Math.max(5, Math.min(95, score));

  document.getElementById('diffFill').style.width = score + '%';

  const names = [
    [15, '🌱 超简单', '#2ecc71'],
    [30, '😊 简单', '#27ae60'],
    [45, '🎯 经典', '#f1c40f'],
    [60, '🔥 较难', '#e67e22'],
    [75, '💪 困难', '#e74c3c'],
    [100,'💀 地狱', '#9b59b6'],
  ];
  let name = '💀 地狱', color = '#9b59b6';
  for (const [threshold, n, c] of names) {
    if (score <= threshold) { name = n; color = c; break; }
  }
  const dn = document.getElementById('diffName');
  dn.textContent = name;
  dn.style.color = color;
}

// ===== 设置弹窗 =====
function openSettings() {
  syncSettingsUI();
  document.getElementById('settingsModal').classList.add('show');
  validateSettings();
}

function applySettings() {
  const s = readSettingsFromUI();
  // 再次校验（防万一）
  if (!s.allowDup && s.numColors < s.codeLen) return;

  cfg = {...s};
  closeModal('settingsModal');
  newGame();
}

// ===== 初始化游戏 =====
function newGame() {
  // 安全校验：无重复时强制修正
  if (!cfg.allowDup && cfg.numColors < cfg.codeLen) {
    cfg.numColors = cfg.codeLen;
  }

  if (cfg.allowDup) {
    answer = Array.from({length: cfg.codeLen}, () => Math.floor(Math.random() * cfg.numColors));
  } else {
    const pool = Array.from({length: cfg.numColors}, (_, i) => i);
    answer = [];
    for (let i = 0; i < cfg.codeLen; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      answer.push(pool.splice(idx, 1)[0]);
    }
  }

  currentGuess = [];
  gameOver = false;
  document.getElementById('maxTurnDisp').textContent = cfg.maxTurns;
  document.getElementById('turnNum').textContent = '1';
  document.getElementById('submitBtn').disabled = true;

  const answerRow = document.getElementById('answerRow');
  answerRow.innerHTML = '';
  for (let i = 0; i < cfg.codeLen; i++) {
    const slot = document.createElement('div');
    slot.className = 'answer-slot';
    slot.id = 'as' + i;
    slot.textContent = '?';
    answerRow.appendChild(slot);
  }

  const paletteRow = document.getElementById('paletteRow');
  paletteRow.innerHTML = '';
  for (let i = 0; i < cfg.numColors; i++) {
    const btn = document.createElement('div');
    btn.className = 'color-btn';
    btn.dataset.c = i;
    btn.onclick = () => pickColor(i);
    paletteRow.appendChild(btn);
  }

  document.getElementById('guessList').innerHTML = '';
  addNewRow();
  updateHelpText();
}

// ===== 帮助文字 =====
function updateHelpText() {
  const dupText = cfg.allowDup ? '（可重复）' : '（不重复）';
  document.getElementById('helpText').innerHTML =
    `电脑从 <b>${cfg.numColors}</b> 种颜色中随机选出 <b>${cfg.codeLen}</b> 个${dupText}<br>` +
    `你的目标是在 <b>${cfg.maxTurns} 轮</b> 内猜出正确顺序<br><br>` +
    `<span style="color:#e74c3c">●</span> 颜色和位置都正确<br>` +
    `<span style="color:#fff">●</span> 颜色正确但位置不对<br>` +
    `<span style="color:#555">●</span> 该颜色不在答案中<br><br>` +
    `<i>提示：反馈不按位置对应哦～</i>`;
}

// ===== 调色盘 =====
function pickColor(c) {
  if (gameOver || currentGuess.length >= cfg.codeLen) return;
  currentGuess.push(c);
  updateCurrentRow();
  highlightPalette();
  document.getElementById('submitBtn').disabled = currentGuess.length < cfg.codeLen;
}

function deleteLast() {
  if (gameOver || currentGuess.length === 0) return;
  currentGuess.pop();
  updateCurrentRow();
  highlightPalette();
  document.getElementById('submitBtn').disabled = currentGuess.length < cfg.codeLen;
}

function highlightPalette() {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
  currentGuess.forEach(c => {
    const btn = document.querySelector(`.color-btn[data-c="${c}"]`);
    if (btn) btn.classList.add('selected');
  });
}

// ===== 行管理 =====
function addNewRow() {
  const list = document.getElementById('guessList');
  const row = document.createElement('div');
  row.className = 'guess-row active';
  row.id = 'currentRow';

  let dotsHtml = '';
  for (let i = 0; i < cfg.codeLen; i++) dotsHtml += '<div class="guess-dot"></div>';

  let pinsHtml = '';
  for (let i = 0; i < cfg.codeLen; i++) pinsHtml += '<div class="fb-pin"></div>';

  row.innerHTML = `
    <div class="row-num">${document.getElementById('turnNum').textContent}</div>
    <div class="guess-dots">${dotsHtml}</div>
    <div class="feedback">${pinsHtml}</div>
  `;
  list.appendChild(row);
  scrollToBottom();
}

function updateCurrentRow() {
  const row = document.getElementById('currentRow');
  if (!row) return;
  const dots = row.querySelectorAll('.guess-dot');
  dots.forEach((d, i) => {
    if (currentGuess[i] !== undefined) {
      d.className = 'guess-dot ' + COLOR_CSS[currentGuess[i]] + ' pop';
    } else {
      d.className = 'guess-dot';
    }
  });
}

function scrollToBottom() {
  const list = document.getElementById('guessList');
  requestAnimationFrame(() => { list.scrollTop = list.scrollHeight; });
}

// ===== 提交猜测 =====
function submitGuess() {
  if (gameOver || currentGuess.length < cfg.codeLen) return;
  const guess = [...currentGuess];
  const fb = getFeedback(answer, guess);

  const row = document.getElementById('currentRow');
  row.classList.remove('active');
  row.removeAttribute('id');

  const pins = row.querySelectorAll('.fb-pin');
  let idx = 0;
  for (let i = 0; i < fb.bulls; i++) pins[idx++].classList.add('bull');
  for (let i = 0; i < fb.hits; i++)   pins[idx++].classList.add('hit');

  const turn = parseInt(document.getElementById('turnNum').textContent);

  if (fb.bulls === cfg.codeLen) {
    gameOver = true;
    revealAnswer(true);
    setTimeout(() => showResult(true, turn), 600);
    return;
  }
  if (turn >= cfg.maxTurns) {
    gameOver = true;
    revealAnswer(false);
    setTimeout(() => showResult(false, turn), 600);
    return;
  }

  document.getElementById('turnNum').textContent = turn + 1;
  currentGuess = [];
  highlightPalette();
  document.getElementById('submitBtn').disabled = true;
  addNewRow();
}

// ===== 核心算法 =====
function getFeedback(ans, guess) {
  const len = ans.length;
  let bulls = 0, hits = 0;
  const aUsed = new Array(len).fill(false);
  const gUsed = new Array(len).fill(false);

  for (let i = 0; i < len; i++) {
    if (guess[i] === ans[i]) { bulls++; aUsed[i]=true; gUsed[i]=true; }
  }
  for (let i = 0; i < len; i++) {
    if (gUsed[i]) continue;
    for (let j = 0; j < len; j++) {
      if (aUsed[j]) continue;
      if (guess[i] === ans[j]) { hits++; aUsed[j]=true; gUsed[i]=true; break; }
    }
  }
  return { bulls, hits };
}

// ===== 揭晓答案 =====
function revealAnswer(won) {
  for (let i = 0; i < cfg.codeLen; i++) {
    setTimeout(() => {
      const el = document.getElementById('as' + i);
      el.innerHTML = `<div class="dot ${COLOR_CSS[answer[i]]} reveal-anim"></div>`;
      el.classList.add('revealed');
    }, i * 150);
  }
}

// ===== 结果 =====
function showResult(won, turns) {
  document.getElementById('resultEmoji').textContent = won ? '🎉' : '😢';
  document.getElementById('resultTitle').textContent = won ? '太厉害了！' : '游戏结束';
  document.getElementById('resultText').textContent = won
    ? `你只用了 ${turns} 轮就猜出来了！\n真是逻辑推理大师 👏`
    : `${cfg.maxTurns} 轮用完了也没猜出来…\n答案已经揭晓，再来一局吧！`;
  document.getElementById('resultModal').classList.add('show');
}

// ===== 弹窗 =====
function toggleHelp() { document.getElementById('helpModal').classList.toggle('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ===== 键盘 =====
document.addEventListener('keydown', e => {
  if (gameOver) return;
  if (document.getElementById('settingsModal').classList.contains('show')) return;
  const num = parseInt(e.key);
  if (num >= 1 && num <= cfg.numColors) {
    pickColor(num - 1);
  } else if (e.key === 'Backspace') {
    deleteLast();
  } else if (e.key === 'Enter') {
    if (currentGuess.length === cfg.codeLen) submitGuess();
  }
});

// ===== 启动 =====
newGame();
</script>
